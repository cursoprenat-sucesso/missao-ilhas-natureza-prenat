<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PRENAT+ | Missão Ilhas da Natureza</title>
  <meta name="description" content="Jogo gamificado PRENAT+ para treino de Ciências da Natureza." />
  <link rel="stylesheet" href="style-v17-final.css?v=18" />
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body class="student-body v17-final">
  <div class="ocean-backdrop" aria-hidden="true">
    <span class="glow glow-a"></span>
    <span class="glow glow-b"></span>
    <span class="wave wave-a"></span>
    <span class="wave wave-b"></span>
  </div>

  <header class="topbar student-topbar">
    <div class="brand-area">
      <img id="brandLogo" class="brand-logo" src="logo-prenat.png" alt="PRENAT+" onerror="this.style.display='none'" />
      <div>
        <strong id="brandName">PRENAT+</strong>
        <span id="missionMini">Missão Ilhas da Natureza</span>
      </div>
    </div>
    <div class="student-actions">
      <span id="studentIdentity" class="student-identity" aria-live="polite"></span>
      <button id="changeStudent" class="btn btn-ghost">Trocar aluno</button>
      <button id="resetProgress" class="btn btn-ghost">Recomeçar missão</button>
    </div>
  </header>

  <main id="app" class="app-shell">
    <section class="loading-card glass-card">
      <div class="loader-orb"></div>
      <h1>Carregando travessia...</h1>
      <p>Preparando o arquipélago, as patentes e os desafios.</p>
    </section>
  </main>

  <template id="studentRegistrationTemplate">
    <section class="registration-overlay" role="dialog" aria-modal="true" aria-labelledby="registrationTitle">
      <article class="registration-card glass-card fade-in">
        <img class="registration-logo" src="logo-prenat.png" alt="PRENAT+" />
        <p class="kicker">IDENTIFICAÇÃO DO NAVEGADOR</p>
        <h1 id="registrationTitle">Antes de iniciar a travessia</h1>
        <p class="registration-intro">Informe seus dados para que seu acesso, suas tentativas e suas conquistas sejam registrados no PRENAT+.</p>
        <form id="studentRegistrationForm" class="registration-form">
          <label>
            <span>Nome completo</span>
            <input name="nome" type="text" autocomplete="name" maxlength="120" required placeholder="Digite seu nome completo" />
          </label>
          <label>
            <span>E-mail</span>
            <input name="email" type="email" autocomplete="email" maxlength="160" required placeholder="Digite seu melhor e-mail" />
          </label>
          <label>
            <span>Turma</span>
            <select name="turma" required>
              <option value="">Selecione sua turma</option>
              <option value="PRENAT+ | Oceano Atlântico | Extensiva">PRENAT+ | Oceano Atlântico | Extensiva</option>
              <option value="PRENAT+ | Oceano Pacífico | Intensiva">PRENAT+ | Oceano Pacífico | Intensiva</option>
            </select>
          </label>
          <p class="registration-error" data-registration-error aria-live="polite"></p>
          <button class="btn btn-primary btn-pulse" type="submit">INICIAR MISSÃO</button>
        </form>
        <p class="registration-privacy">Seus dados serão usados exclusivamente para acompanhar sua evolução pedagógica no PRENAT+.</p>
      </article>
    </section>
  </template>

  <template id="homeTemplate">
    <section class="hero-flow fade-in">
      <article class="mission-gate glass-card">
        <div class="mission-logo-mark">
          <img class="mission-logo-img" src="logo-prenat.png" alt="PRENAT+" onerror="this.style.display='none'" />
          <div class="mission-compass">✦</div>
        </div>
        <p class="kicker" data-bind="missionKicker"></p>
        <h1 data-bind="missionName"></h1>
        <p class="hero-subtitle" data-bind="subtitle"></p>
        <p class="hero-intro" data-bind="intro"></p>
        <div class="hero-actions">
          <button class="btn btn-primary btn-pulse" data-action="continue">Iniciar/continuar travessia</button>
          <button class="btn btn-soft" data-action="view-map">Ver mapa das ilhas</button>
        </div>
        <div class="flow-note" data-bind="studentThemeNote"></div>
      </article>

      <aside class="rank-panel glass-card">
        <div class="rank-orb premium-medal" data-rank-icon></div>
        <div class="rank-card-inner">
          <span class="tiny-label">Patente atual</span>
          <h2 data-rank-name></h2>
          <p data-rank-description></p>
        </div>
        <div class="progress-ring" aria-label="Progresso da missão">
          <svg viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="50" class="ring-bg"></circle>
            <circle cx="60" cy="60" r="50" class="ring-value" data-progress-circle></circle>
          </svg>
          <strong data-progress-text>0%</strong>
        </div>
        <p class="progress-caption" data-progress-caption></p>
      </aside>
    </section>

    <section id="mapa" class="map-card glass-card fade-in">
      <div class="section-title-row">
        <div>
          <span class="kicker">Mapa do arquipélago</span>
          <h2>Escolha a próxima ilha</h2>
        </div>
        <span class="badge-pill" data-bind="missionName"></span>
      </div>
      <div class="map-story" data-map-story></div>
      <div class="archipelago-board" data-island-map></div>
    </section>
  </template>

  <template id="quizTemplate">
    <section class="quiz-layout fade-in">
      <aside class="quiz-sidebar glass-card">
        <button class="btn btn-ghost small" data-action="back-home">← Voltar ao mapa</button>
        <span class="tiny-label">Ilha atual</span>
        <h2 data-phase-title></h2>
        <p data-phase-story></p>
        <div class="stat-grid">
          <div class="stat-box stat-lives"><span>Vidas</span><strong data-lives></strong></div>
          <div class="stat-box"><span>Meta</span><strong data-minpercent></strong></div>
          <div class="stat-box"><span>Acertos</span><strong data-score></strong></div>
        </div>
        <div class="quest-progress"><div data-quiz-progress></div></div>
        <p class="small-muted" data-question-count></p>
        <div class="flow-microcopy">Responda com calma. Se errar, use o comentário para ajustar a rota.</div>
      </aside>
      <article class="question-card glass-card">
        <div class="question-topline">
          <span class="badge-pill" data-question-index></span>
          <span class="badge-pill subtle" data-question-meta></span>
        </div>
        <h1 data-question-statement></h1>
        <div class="question-image-wrap" data-question-image-wrap>
          <img data-question-image alt="Imagem da questão" />
        </div>
        <div class="options-list" data-options-list></div>
        <div class="feedback-panel hidden" data-feedback-panel>
          <h3 data-feedback-title></h3>
          <p data-feedback-text></p>
          <p class="descriptor" data-feedback-descriptor></p>
          <button class="btn btn-primary" data-action="next-question">Continuar</button>
        </div>
      </article>
    </section>
  </template>

  <template id="resultTemplate">
    <section class="result-card glass-card fade-in">
      <div class="result-icon premium-medal" data-result-icon></div>
      <span class="kicker" data-result-kicker></span>
      <h1 data-result-title></h1>
      <p data-result-message></p>
      <div class="result-stats">
        <div><span>Acertos</span><strong data-result-score></strong></div>
        <div><span>Aproveitamento</span><strong data-result-percent></strong></div>
        <div><span>Meta</span><strong data-result-target></strong></div>
      </div>
      <div class="rank-unlock" data-rank-unlock></div>
      <div class="hero-actions center">
        <button class="btn btn-primary" data-action="result-main"></button>
        <button class="btn btn-soft" data-action="back-home">Voltar ao mapa</button>
      </div>
    </section>
  </template>

  <script src="app-v17-final.js?v=18"></script>
</body>
</html>
